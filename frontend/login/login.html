<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Entre Corridas | Login</title>
</head>

<body>

    <div class="login-container">

        <div class="logo">
            <h1>Entre Corridas</h1>
            <p>Rede Inteligente de Entregas</p>
        </div>

        <div id="mensagem"></div>

        <form id="loginForm">

            <div>
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    required>
            </div>

            <div>
                <label>Senha</label>
                <input
                    type="password"
                    id="senha"
                    required>
            </div>

            <button type="submit">
                Entrar
            </button>

        </form>

        <div class="footer-link">
            <a href="register.html">
                Criar Conta
            </a>
        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
